<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#1a1f2e"/>
  
  <!-- Outer orbit ring — teal glow -->
  <circle cx="16" cy="16" r="11" stroke="#00d4ff" stroke-width="1.8" stroke-dasharray="4 2.5" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Inner orbit ring -->
  <circle cx="16" cy="16" r="7.5" stroke="#00d4ff" stroke-width="1" opacity="0.35"/>

  <!-- Diamond / gem shape (Ethereum-style) -->
  <polygon points="16,6.5 21.5,14 16,17.5 10.5,14" fill="#00d4ff" opacity="0.15"/>
  <polygon points="16,6.5 21.5,14 16,17.5 10.5,14" stroke="#00d4ff" stroke-width="1.2" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <polygon points="16,17.5 21.5,14 16,25.5 10.5,14" fill="#00d4ff" opacity="0.08"/>
  <polygon points="16,17.5 21.5,14 16,25.5 10.5,14" stroke="#00d4ff" stroke-width="1.2" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Navigation arrow -->
  <polygon points="19,19 24,14 19,24" fill="white" opacity="0.85"/>
</svg>
